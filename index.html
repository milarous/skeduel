<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeduel - Task Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">Skeduel</h1>
        </header>

        <main class="main-content">
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="new-task-input" 
                        placeholder="What needs to be done?" 
                        aria-label="New task input"
                    >
                    <input 
                        type="date" 
                        id="due-date-input" 
                        class="due-date-input"
                        aria-label="Due date (optional)"
                    >
                    <button class="add-btn" onclick="addTask()" aria-label="Add task">
                        <span class="add-icon">+</span>
                        <span class="add-text">Add Task</span>
                    </button>
                </div>
            </div>

            <div class="tasks-section">
                <div class="tasks-header">
                    <span class="task-count" id="task-count">0 tasks</span>
                    <div class="sorting-controls">
                        <label for="sort-select" class="sort-label">Sort by:</label>
                        <select id="sort-select" class="sort-select" onchange="handleSortChange()">
                            <option value="dueDate">Due Date</option>
                            <option value="manual">Manual</option>
                        </select>
                    </div>
                    <button class="clear-completed-btn" onclick="clearCompleted()" id="clear-completed" style="display: none;">
                        Clear Completed
                    </button>
                </div>
                <ul class="task-list" id="task-list"></ul>
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon">📝</div>
                    <h3 class="empty-title">No tasks yet!</h3>
                    <p class="empty-description">Add your first task to get started with your productivity journey.</p>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>Stay organized, stay productive ✨</p>
        </footer>
    </div>

    <script src="js/app.js" defer></script>
</body>
</html>
