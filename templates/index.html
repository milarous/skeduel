<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeduel - Task Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div></div>
            <h1 class="app-title">Skeduel</h1>
            <div></div>
        </header>

<main class="main-content">
            <div class="task-column">
                <h2 class="column-header">Task Manager</h2>
                <div class="input-section">
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="new-task-input"
                            placeholder="What needs to be done?"
                            aria-label="New task input"
                        >
                        <input
                            type="date"
                            id="due-date-input"
                            class="due-date-input"
                            aria-label="Due date (optional)"
                        >
                        <button class="add-btn" onclick="addTask()" aria-label="Add task">
                            <span class="add-icon">+</span>
                            <span class="add-text">Add Task</span>
                        </button>
                        <div class="recurrence-row">
                            <label class="recurrence-toggle">
                                <span class="toggle-switch">
                                    <input type="checkbox" id="recurrence-enabled" onchange="toggleRecurrenceOptions()">
                                    <span class="toggle-slider"></span>
                                </span>
                                <span>Repeat</span>
                            </label>
                            <div id="recurrence-options" class="recurrence-options" style="display: none;">
                                <select id="recurrence-frequency" class="recurrence-select">
                                    <option value="daily">Daily</option>
                                    <option value="weekly" selected>Weekly</option>
                                    <option value="monthly">Monthly</option>
                                    <option value="yearly">Yearly</option>
                                </select>
                                <span class="recurrence-every">every</span>
                                <input type="number" id="recurrence-interval" class="recurrence-interval" value="1" min="1">
                                <span class="expiry-label">Ends:</span>
                                <select id="expiry-type" class="expiry-select" onchange="toggleExpiryInput()">
                                    <option value="none">Never</option>
                                    <option value="date">On date</option>
                                    <option value="count">After</option>
                                </select>
                                <input type="date" id="expiry-date" class="expiry-input" style="display: none;">
                                <input type="number" id="expiry-count" class="expiry-input" placeholder="times" min="1" style="display: none;">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tasks-section">
                    <div class="tasks-header">
                        <span class="task-count" id="task-count">0 tasks</span>
                        <button class="clear-completed-btn" onclick="clearCompleted()" id="clear-completed" style="display: none;">
                            Clear Completed
                        </button>
                    </div>
                    <ul class="task-list" id="task-list"></ul>
                    <div class="empty-state" id="empty-state">
                        <div class="empty-icon">📝</div>
                        <h3 class="empty-title">No tasks yet!</h3>
                        <p class="empty-description">Add your first task to get started with your productivity journey.</p>
                    </div>
                </div>
            </div>

            <div class="focus-column">
                <h2 class="column-header">Daily Focus</h2>
                <div class="focus-panel">
                    <div class="focus-header">
                        <button class="focus-nav-btn" id="focus-prev">&lt; Prev</button>
                        <span class="focus-date" id="focus-date">Today</span>
                        <button class="focus-nav-btn" id="focus-next">Next &gt;</button>
                    </div>
                    <div class="focus-drop-zone" id="focus-drop-zone"></div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>Stay organized, stay productive ✨</p>
        </footer>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-message" id="modal-message"></div>
            <div class="modal-buttons" id="modal-buttons">
                <button class="modal-btn modal-btn-confirm" id="modal-confirm">Confirm</button>
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/storage.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/data.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/focusDay.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/taskList.js') }}" defer></script>
</body>
</html>
